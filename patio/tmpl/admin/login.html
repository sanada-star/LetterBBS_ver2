<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者ログイン - <!-- var:bbs_title --></title>
<link href="./cmn/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-main">
  <div class="admin-login">
    <div class="admin-card">
      <h2 style="text-align:center;">&#128295; 管理者ログイン</h2>
      <!-- if:login_error -->
      <div class="admin-alert admin-alert-error"><!-- var:login_error --></div>
      <!-- /if:login_error -->
      <form action="<!-- var:admin_url -->" method="post" class="admin-form">
        <input type="hidden" name="action" value="login">
        <input type="hidden" name="csrf_token" value="<!-- var:csrf_token -->">
        <div class="form-group">
          <label>ログインID</label>
          <input type="text" name="login_id" required autofocus>
        </div>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" name="password" required>
        </div>
        <div style="text-align:center; margin-top:var(--sp-lg);">
          <button type="submit" class="btn-admin btn-admin-primary">ログイン</button>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="admin-footer"><p>LetterBBS ver2 Administration</p></div>
</body>
</html>

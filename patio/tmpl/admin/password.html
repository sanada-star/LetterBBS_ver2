<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワード変更 - <!-- var:bbs_title --></title>
<link href="./cmn/admin.css" rel="stylesheet">
</head>
<body>
<header class="admin-header">
  <h1><a href="<!-- var:admin_url -->?action=menu"><!-- var:bbs_title --> 管理画面</a></h1>
  <div class="admin-header-actions">
    <a href="<!-- var:admin_url -->?action=menu">&#8617; メニュー</a>
    <a href="<!-- var:admin_url -->?action=logout">ログアウト</a>
  </div>
</header>
<div class="admin-main">
  <div class="admin-card" style="max-width:420px; margin:0 auto;">
    <h2>&#128272; パスワード変更</h2>

    <!-- if:message -->
    <div class="admin-alert admin-alert-success"><!-- var:message --></div>
    <!-- /if:message -->
    <!-- if:error -->
    <div class="admin-alert admin-alert-error"><!-- var:error --></div>
    <!-- /if:error -->

    <form action="<!-- var:admin_url -->" method="post" class="admin-form">
      <input type="hidden" name="action" value="password_exec">
      <input type="hidden" name="csrf_token" value="<!-- var:csrf_token -->">
      <div class="form-group">
        <label>現在のパスワード</label>
        <input type="password" name="old_password" required>
      </div>
      <div class="form-group">
        <label>新しいパスワード</label>
        <input type="password" name="new_password" required>
      </div>
      <div class="form-group">
        <label>新しいパスワード（確認）</label>
        <input type="password" name="new_password_confirm" required>
      </div>
      <div style="text-align:center; margin-top:var(--sp-lg);">
        <button type="submit" class="btn-admin btn-admin-primary">パスワードを変更</button>
      </div>
    </form>
  </div>
</div>
<div class="admin-footer"><p>Modified by <a href="https://github.com/sanada-star" target="_blank" rel="noopener">sanada</a> / Original BBS script by <a href="https://www.kent-web.com/" target="_blank" rel="noopener">KENT-WEB</a></p></div>
</body>
</html>

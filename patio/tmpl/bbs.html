<section class="topic-container">
  <!-- if:threads -->
  <!-- loop:threads -->
  <a href="<!-- var:cgi_url -->?mode=read&id=<!-- var:id -->" class="thread-row">
    <div class="t-icon"><span class="ico-<!-- var:icon -->"></span></div>
    <div class="t-title" title="<!-- var:subject -->"><!-- var:subject --></div>
    <div class="t-from" title="<!-- var:author -->"><b><!-- var:author --></b></div>
    <div class="t-last" title="<!-- var:last_author -->"><b><!-- var:last_author --></b></div>
    <div class="t-date"><!-- var:display_date --></div>
    <div class="t-stats">
      <span class="res-count"><!-- var:post_count --> 通</span>
      <!-- if:is_new --><span class="badge-new" style="margin-left:4px;">NEW</span><!-- /if:is_new -->
    </div>
  </a>
  <!-- /loop:threads -->
  <!-- /if:threads -->

  <!-- unless:threads -->
  <p class="text-center mt-2">スレッドがありません。</p>
  <!-- /unless:threads -->
</section>

<!-- raw:pagination -->

<div id="icon-mark" class="text-center mt-2 icon-list">
  <span class="ico-fld_nor"></span> 通常
  <span class="ico-fld_new"></span> 新着
  <span class="ico-fld_img"></span> 画像あり
  <span class="ico-fld_lock"></span> ロック
</div>

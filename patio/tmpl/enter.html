<div class="form-container" style="max-width:420px; margin:2rem auto;">
  <h2 class="topic-header mb-1 text-center">&#128274; ログイン</h2>
  <p class="text-center mb-1" style="color:var(--c-text-sub); font-size:0.9rem;">
    この掲示板は会員制です。ログインしてご利用ください。
  </p>

  <!-- if:login_error -->
  <div class="alert alert-error mb-1"><!-- var:login_error --></div>
  <!-- /if:login_error -->

  <form action="<!-- var:cgi_url -->" method="post">
    <input type="hidden" name="mode" value="login">
    <input type="hidden" name="csrf_token" value="<!-- var:csrf_token -->">

    <div class="bbsform">
      <div class="form-group">
        <label>ログインID</label>
        <input type="text" name="login_id" required autofocus placeholder="IDを入力">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" name="login_pwd" required placeholder="パスワードを入力">
      </div>
    </div>

    <div class="submit-btn-area">
      <input type="submit" value="ログイン" class="submit-btn">
    </div>
  </form>
</div>

<div class="form-container">
  <!-- if:is_reply -->
  <h2 class="topic-header mb-1">&#9993; 返信: <!-- var:thread_subject --></h2>
  <!-- /if:is_reply -->
  <!-- unless:is_reply -->
  <h2 class="topic-header mb-1"><span class="ico-fld_new"></span> 新しいスレッドを作成する</h2>
  <!-- /unless:is_reply -->

  <form action="<!-- var:cgi_url -->" method="post" enctype="multipart/form-data" name="bbsform">
    <input type="hidden" name="mode" value="post">
    <input type="hidden" name="thread_id" value="<!-- raw:thread_id -->">
    <input type="hidden" name="csrf_token" value="<!-- var:csrf_token -->">
    <!-- if:use_captcha -->
    <input type="hidden" name="captcha_token" value="<!-- var:captcha_token -->">
    <!-- /if:use_captcha -->

    <div class="bbsform">
      <!-- if:error_message -->
      <div class="form-group">
        <p style="margin:0; color:#b00020; font-weight:bold;"><!-- var:error_message --></p>
      </div>
      <!-- /if:error_message -->

      <div class="form-group">
        <label>件名</label>
        <input type="text" name="subject" placeholder="用件を記入してください" value="<!-- var:form_subject -->">
      </div>
      <div class="form-group">
        <label>名前</label>
        <input type="text" name="name" value="<!-- var:form_name -->" placeholder="あなたのお名前">
      </div>
      <div class="form-group">
        <label>メッセージ</label>
        <textarea name="body" rows="10" placeholder="ここにメッセージを入力..."><!-- var:form_body --></textarea>
      </div>

      <!-- if:image_upl -->
      <div class="form-group">
        <label>画像添付</label>
        <div class="file-input-wrapper">
          <input type="file" name="file1" accept="image/jpeg,image/png,image/gif">
        </div>
        <div class="file-input-wrapper">
          <input type="file" name="file2" accept="image/jpeg,image/png,image/gif">
        </div>
        <div class="file-input-wrapper">
          <input type="file" name="file3" accept="image/jpeg,image/png,image/gif">
        </div>
      </div>
      <!-- /if:image_upl -->

      <div class="form-group">
        <label>削除用パスワード</label>
        <input type="password" name="pwd" maxlength="8">
      </div>

      <!-- if:use_captcha -->
      <div class="form-group">
        <label>CAPTCHA</label>
        <div style="margin-bottom:0.75rem;">
          <img src="<!-- var:captcha_url -->" alt="CAPTCHA" style="display:block; max-width:120px; height:auto; border:1px solid rgba(0,0,0,0.15); border-radius:6px; background:#f4efe6;">
        </div>
        <input type="text" name="captcha_code" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="画像の数字を入力">
        <p style="margin:0.5rem 0 0; font-size:0.9rem; color:var(--c-text-sub);">読みにくい場合は画像を再読み込みすると更新されます。</p>
      </div>
      <!-- /if:use_captcha -->
    </div>

    <div class="submit-btn-area">
      <!-- if:is_reply -->
      <input type="submit" value="返信する &#9993;" class="submit-btn">
      <!-- /if:is_reply -->
      <!-- unless:is_reply -->
      <input type="submit" value="スレッドを作成する &#9993;" class="submit-btn">
      <!-- /unless:is_reply -->
    </div>
  </form>
</div>
